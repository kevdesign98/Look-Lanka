<app-navbar />
<div class="flex flex-col w-full h-[calc(100vh-80px)] bg-slate-100 p-0 md:p-6 md:pt-2">

    <div
        class="relative w-full h-full overflow-hidden rounded-none md:rounded-[40px] shadow-2xl border-none md:border md:border-white/50 bg-slate-200">

        <div #mapViewNode id="mapViewNode" class="w-full h-full"></div>

        <div class="absolute z-10 
                inset-x-4 bottom-10           /* Mobile: centrata in basso */
                md:inset-x-auto md:left-8 md:top-1/2 md:-translate-y-1/2 md:bottom-auto /* Desktop: sinistra */
                w-auto md:w-72">

            <div
                class="bg-white/90 backdrop-blur-md p-5 md:p-6 rounded-[24px] md:rounded-[32px] shadow-xl border border-white">
                <h2 class="text-lg md:text-xl font-bold text-slate-800 italic leading-tight">Look Lanka</h2>
                <p class="text-[9px] md:text-[10px] text-slate-500 mb-3 md:mb-4 uppercase tracking-widest font-bold">
                    Travel Canvas</p>

                <div
                    class="space-y-2 md:space-y-3 max-h-[200px] md:max-h-[350px] overflow-y-auto pr-1 custom-scrollbar">
                    @for (loc of selectedLocations(); track loc.id) {
                    <div
                        class="flex items-center justify-between p-3 bg-white/60 rounded-xl shadow-sm border border-white animate-in">
                        <span class="text-sm font-semibold text-slate-700">{{ loc.name }}</span>
                        <button (click)="$event.stopPropagation(); removeFromTrip(loc.id)"
                            class="text-red-400 hover:text-red-600 p-1">
                            <i class="pi pi-trash"></i>
                        </button>
                    </div>
                    } @empty {
                    <div
                        class="p-4 md:p-6 border-2 border-dashed border-slate-300 rounded-[20px] md:rounded-[24px] text-center bg-slate-50/30">
                        <p class="text-[10px] md:text-[11px] text-slate-400 leading-relaxed">
                            Clicca sui marker verdi per<br>pianificare il viaggio
                        </p>
                    </div>
                    }
                </div>

                @if (selectedLocations().length > 0) {
                <button
                    class="w-full mt-3 md:mt-4 py-3 bg-emerald-500 hover:bg-emerald-600 text-white text-xs md:text-sm font-bold rounded-xl transition-all shadow-lg shadow-emerald-200">
                    Salva Itinerario
                </button>
                }
            </div>
        </div>
    </div>
</div>
<app-footer />
