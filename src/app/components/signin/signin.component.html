<div class="ll-signin-wrap">

    <app-navbar-signin />
    <!-- ══ LEFT PANEL — image + quote ══ -->
    <div class="ll-panel-left">
        <div class="ll-panel-img">
            <img src="https://images.unsplash.com/photo-1580910527739-556eb89f9d65?q=80&w=1074&auto=format&fit=crop"
                alt="Sri Lanka Nature" />
        </div>
        <div class="ll-panel-grain"></div>
        <div class="ll-panel-orb ll-panel-orb-1"></div>
        <div class="ll-panel-orb ll-panel-orb-2"></div>

        <div class="ll-panel-content">
            <!-- Logo -->
            <div class="ll-panel-logo">
                <span class="ll-logo-icon">🌿</span>
                <span class="ll-logo-text">LookLanka</span>
            </div>

            <!-- Quote -->
            <blockquote class="ll-panel-quote">
                "The island of serendipity awaits you, safely."
            </blockquote>
            <p class="ll-panel-sub">
                Log in to unlock your personalised planner and travel without worries.
            </p>

            <!-- Trust badges -->
            <div class="ll-trust-row">
                <div class="ll-trust-badge">
                    <i class="pi pi-shield text-xs"></i>
                    <span>Verified Data</span>
                </div>
                <div class="ll-trust-badge">
                    <i class="pi pi-map-marker text-xs"></i>
                    <span>Live Map</span>
                </div>
                <div class="ll-trust-badge">
                    <i class="pi pi-users text-xs"></i>
                    <span>Community</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ RIGHT PANEL — auth ══ -->
    <div class="ll-panel-right">
        <div class="ll-auth-box">

            <!-- Header -->
            <div class="ll-auth-header text-center">
                <h1 class="ll-auth-title">Welcome!</h1>
                <p class="ll-auth-sub">Sign in to your LookLankan account</p>
            </div>

            <!-- Social buttons -->
            <div class="ll-social-stack">

                <button (click)="signInWithGoogle()" class="ll-social-btn ll-social-btn--google">
                    <span class="ll-social-icon">
                        <!-- Google SVG logo -->
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path
                                d="M17.64 9.2045C17.64 8.5663 17.5827 7.9527 17.4764 7.3636H9V10.845H13.8436C13.635 11.97 13.0009 12.9231 12.0477 13.5613V15.8195H14.9564C16.6582 14.2527 17.64 11.9454 17.64 9.2045Z"
                                fill="#4285F4" />
                            <path
                                d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5613C11.2418 14.1013 10.2109 14.4204 9 14.4204C6.65591 14.4204 4.67182 12.8372 3.96409 10.71H0.957275V13.0418C2.43818 15.9831 5.48182 18 9 18Z"
                                fill="#34A853" />
                            <path
                                d="M3.96409 10.71C3.78409 10.17 3.68182 9.5931 3.68182 9C3.68182 8.4068 3.78409 7.8299 3.96409 7.29V4.9581H0.957275C0.347727 6.1731 0 7.5477 0 9C0 10.4522 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z"
                                fill="#FBBC05" />
                            <path
                                d="M9 3.5795C10.3214 3.5795 11.5077 4.0336 12.4405 4.9254L15.0218 2.344C13.4632 0.8918 11.4259 0 9 0C5.48182 0 2.43818 2.0168 0.957275 4.9581L3.96409 7.29C4.67182 5.1627 6.65591 3.5795 9 3.5795Z"
                                fill="#EA4335" />
                        </svg>
                    </span>
                    <span class="ll-social-label">Continue with Google</span>
                    <i class="pi pi-arrow-right ll-social-arrow"></i>
                </button>


                <button class="ll-social-btn ll-social-btn--apple">
                    <span class="ll-social-icon">
                        <svg width="16" height="18" viewBox="0 0 16 18" fill="currentColor">
                            <path
                                d="M13.1719 9.5859C13.1562 7.6523 14.7344 6.7148 14.8086 6.668C13.8633 5.2773 12.375 5.0859 11.8477 5.0703C10.5938 4.9414 9.375 5.8008 8.73438 5.8008C8.07422 5.8008 7.07813 5.0859 6.01172 5.1016C4.64453 5.1172 3.36328 5.8945 2.65234 7.1094C1.19141 9.5781 2.27344 13.2266 3.67578 15.2344C4.38672 16.2109 5.21484 17.3086 6.30469 17.2695C7.35938 17.2305 7.76172 16.6016 9.02344 16.6016C10.2695 16.6016 10.6406 17.2695 11.7344 17.2461C12.8594 17.2305 13.5781 16.2578 14.2734 15.2734C15.0977 14.1523 15.4297 13.0625 15.4453 13.0078C15.418 12.9922 13.1875 12.1484 13.1719 9.5859Z" />
                            <path
                                d="M11.0234 3.5547C11.5977 2.8594 11.9922 1.9063 11.8789 0.9375C11.0625 0.9688 10.0547 1.4922 9.45703 2.1719C8.92578 2.7773 8.45313 3.7617 8.58203 4.707C9.49609 4.7773 10.4336 4.25 11.0234 3.5547Z" />
                        </svg>
                    </span>
                    <span class="ll-social-label">Coming soon!</span>
                    <i class="pi pi-arrow-right ll-social-arrow"></i>
                </button>

            </div>

            <!-- Divider -->
            <div class="ll-divider">
                <span class="ll-divider-line"></span>
                <span class="ll-divider-text">secure &amp; private</span>
                <span class="ll-divider-line"></span>
            </div>

            <!-- Footer note -->
            <p class="ll-auth-note">
                By signing in you agree to our
                <a href="#" class="ll-auth-link">Terms</a> and
                <a href="#" class="ll-auth-link">Privacy Policy</a>.
            </p>



        </div>
    </div>

</div>

<app-footer />
